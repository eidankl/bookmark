<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      color: #64748b;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6366f1;
      margin-bottom: 1rem;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #12151f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="url"]::placeholder {
      color: #3d4466;
    }

    input[type="text"]:focus,
    input[type="url"]:focus {
      border-color: #6366f1;
    }

    .btn-add {
      padding: 0.65rem 1.2rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      align-self: flex-end;
      width: 100%;
    }

    .btn-add:hover { background: #4f51d8; }
    .btn-add:active { transform: scale(0.98); }

    .error-msg {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: 0.3rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    #bookmark-count {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    #bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 0 1rem;
      color: #3d4466;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 0.75rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: #12151f;
      border: 1px solid #2d3148;
      border-radius: 10px;
      transition: border-color 0.2s;
      animation: slide-in 0.2s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bookmark-item:hover { border-color: #6366f1; }

    .favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #2d3148;
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-url {
      font-size: 0.75rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.15rem;
    }

    .bookmark-url a {
      color: inherit;
      text-decoration: none;
    }

    .bookmark-url a:hover { color: #a78bfa; }

    .btn-delete {
      padding: 0.35rem 0.65rem;
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #64748b;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-delete:hover {
      background: #3b1f1f;
      border-color: #f87171;
      color: #f87171;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #3d4466;
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 0.6rem 0.9rem 0.6rem 2.25rem;
      background: #12151f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search::placeholder { color: #3d4466; }
    #search:focus { border-color: #6366f1; }

    .highlight { color: #a78bfa; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bookmark Manager</h1>
      <p>Save and organize your favorite links</p>
    </header>

    <div class="card">
      <h2>Add Bookmark</h2>
      <div class="form-row">
        <div>
          <input type="text" id="input-title" placeholder="Title  (e.g. GitHub)" autocomplete="off">
        </div>
        <div>
          <input type="url" id="input-url" placeholder="URL  (e.g. https://github.com)" autocomplete="off">
          <div class="error-msg" id="url-error">Please enter a valid URL starting with http:// or https://</div>
        </div>
        <button class="btn-add" id="btn-add">Add Bookmark</button>
      </div>
    </div>

    <div class="card">
      <h2>Saved Bookmarks</h2>
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search bookmarks…" autocomplete="off">
      </div>
      <div id="bookmark-count"></div>
      <div id="bookmark-list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bm_bookmarks';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(bookmarks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function isValidUrl(str) {
      try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
      catch { return false; }
    }

    function faviconUrl(url) {
      try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; }
      catch { return ''; }
    }

    function highlight(text, query) {
      if (!query) return escHtml(text);
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return escHtml(text).replace(
        new RegExp(escaped.replace(/&amp;|&lt;|&gt;|&quot;|&#39;/g, m => m), 'gi'),
        m => `<span class="highlight">${m}</span>`
      );
    }

    function render() {
      const bookmarks = load();
      const query = document.getElementById('search').value.trim().toLowerCase();
      const filtered = query
        ? bookmarks.filter(bm => bm.title.toLowerCase().includes(query))
        : bookmarks;
      const list = document.getElementById('bookmark-list');
      const count = document.getElementById('bookmark-count');

      if (bookmarks.length === 0) {
        count.textContent = '';
        list.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z"/>
            </svg>
            <p>No bookmarks yet — add one above!</p>
          </div>`;
        return;
      }

      count.textContent = query
        ? `${filtered.length} of ${bookmarks.length} bookmark${bookmarks.length === 1 ? '' : 's'}`
        : `${bookmarks.length} bookmark${bookmarks.length === 1 ? '' : 's'}`;

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
            </svg>
            <p>No bookmarks match "<strong>${escHtml(query)}</strong>"</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map((bm) => {
        const i = bookmarks.indexOf(bm);
        return `
        <div class="bookmark-item" data-index="${i}">
          <img class="favicon" src="${faviconUrl(bm.url)}" alt=""
            onerror="this.style.visibility='hidden'">
          <div class="bookmark-info">
            <div class="bookmark-title">${highlight(bm.title, query)}</div>
            <div class="bookmark-url">
              <a href="${escHtml(bm.url)}" target="_blank" rel="noopener noreferrer">
                ${escHtml(bm.url)}
              </a>
            </div>
          </div>
          <button class="btn-delete" data-index="${i}" title="Delete">Delete</button>
        </div>`;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    document.getElementById('btn-add').addEventListener('click', () => {
      const titleEl = document.getElementById('input-title');
      const urlEl   = document.getElementById('input-url');
      const errEl   = document.getElementById('url-error');

      const rawUrl  = urlEl.value.trim();
      const title   = titleEl.value.trim() || rawUrl;

      errEl.classList.remove('visible');

      if (!rawUrl) { urlEl.focus(); return; }
      if (!isValidUrl(rawUrl)) { errEl.classList.add('visible'); urlEl.focus(); return; }

      const bookmarks = load();
      bookmarks.unshift({ title, url: rawUrl, added: Date.now() });
      save(bookmarks);

      titleEl.value = '';
      urlEl.value   = '';
      render();
    });

    document.getElementById('input-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });

    document.getElementById('input-title').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('input-url').focus();
    });

    document.getElementById('search').addEventListener('input', render);

    document.getElementById('bookmark-list').addEventListener('click', e => {
      const btn = e.target.closest('.btn-delete');
      if (!btn) return;
      const i = parseInt(btn.dataset.index, 10);
      const bookmarks = load();
      bookmarks.splice(i, 1);
      save(bookmarks);
      render();
    });

    render();
  </script>
</body>
</html>
