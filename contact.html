<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      color: #64748b;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.45rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.7rem 0.95rem;
      background: #12151f;
      border: 1px solid #2d3148;
      border-radius: 9px;
      color: #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: #3d4466;
    }

    input:focus,
    textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    input.invalid,
    textarea.invalid {
      border-color: #f87171;
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.12);
    }

    textarea {
      min-height: 130px;
    }

    .field-error {
      font-size: 0.78rem;
      color: #f87171;
      margin-top: 0.35rem;
      display: none;
    }

    .field-error.visible { display: block; }

    .char-count {
      font-size: 0.75rem;
      color: #3d4466;
      text-align: right;
      margin-top: 0.3rem;
      transition: color 0.2s;
    }

    .char-count.warn { color: #fbbf24; }
    .char-count.over { color: #f87171; }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover:not(:disabled) { background: #4f51d8; }
    .btn-submit:active:not(:disabled) { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success state */
    .success-state {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      animation: fade-in 0.3s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 56px;
      height: 56px;
      background: rgba(99, 102, 241, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .success-icon svg {
      width: 28px;
      height: 28px;
      color: #6366f1;
    }

    .success-state h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 0.4rem;
    }

    .success-state p {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .btn-reset {
      padding: 0.6rem 1.4rem;
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-reset:hover {
      border-color: #6366f1;
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Contact Us</h1>
      <p>We'll get back to you as soon as possible</p>
    </header>

    <div class="card">
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Jane Smith" autocomplete="name">
          <div class="field-error" id="name-error">Please enter your name.</div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="jane@example.com" autocomplete="email">
          <div class="field-error" id="email-error">Please enter a valid email address.</div>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="How can we help you?" maxlength="1000"></textarea>
          <div class="char-count" id="char-count">0 / 1000</div>
          <div class="field-error" id="message-error">Please enter a message.</div>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <div class="spinner" id="spinner"></div>
          <span id="btn-label">Send Message</span>
        </button>
      </form>

      <div class="success-state" id="success-state">
        <div class="success-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2>Message Sent!</h2>
        <p id="success-msg"></p>
        <button class="btn-reset" id="btn-reset">Send another message</button>
      </div>
    </div>
  </div>

  <script>
    const form      = document.getElementById('contact-form');
    const nameEl    = document.getElementById('name');
    const emailEl   = document.getElementById('email');
    const msgEl     = document.getElementById('message');
    const charCount = document.getElementById('char-count');
    const spinner   = document.getElementById('spinner');
    const btnLabel  = document.getElementById('btn-label');
    const btnSubmit = document.getElementById('btn-submit');
    const successEl = document.getElementById('success-state');
    const successMsg = document.getElementById('success-msg');

    function setError(input, errorId, show) {
      const err = document.getElementById(errorId);
      if (show) {
        input.classList.add('invalid');
        err.classList.add('visible');
      } else {
        input.classList.remove('invalid');
        err.classList.remove('visible');
      }
    }

    function validateName() {
      const ok = nameEl.value.trim().length >= 2;
      setError(nameEl, 'name-error', !ok);
      return ok;
    }

    function validateEmail() {
      const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim());
      setError(emailEl, 'email-error', !ok);
      return ok;
    }

    function validateMessage() {
      const ok = msgEl.value.trim().length >= 10;
      setError(msgEl, 'message-error', !ok);
      return ok;
    }

    nameEl.addEventListener('blur', validateName);
    emailEl.addEventListener('blur', validateEmail);
    msgEl.addEventListener('blur', validateMessage);

    nameEl.addEventListener('input', () => nameEl.classList.contains('invalid') && validateName());
    emailEl.addEventListener('input', () => emailEl.classList.contains('invalid') && validateEmail());
    msgEl.addEventListener('input', () => {
      const len = msgEl.value.length;
      charCount.textContent = `${len} / 1000`;
      charCount.className = 'char-count' + (len > 900 ? ' over' : len > 750 ? ' warn' : '');
      if (msgEl.classList.contains('invalid')) validateMessage();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const ok = [validateName(), validateEmail(), validateMessage()].every(Boolean);
      if (!ok) return;

      btnSubmit.disabled = true;
      spinner.style.display = 'block';
      btnLabel.textContent = 'Sending…';

      await new Promise(r => setTimeout(r, 1200));

      form.style.display = 'none';
      successEl.style.display = 'block';
      successMsg.textContent =
        `Thanks, ${nameEl.value.trim().split(' ')[0]}! We've received your message and will reply to ${emailEl.value.trim()} shortly.`;
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      form.reset();
      charCount.textContent = '0 / 1000';
      charCount.className = 'char-count';
      ['name','email','message'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('invalid');
        document.getElementById(`${id}-error`).classList.remove('visible');
      });
      btnSubmit.disabled = false;
      spinner.style.display = 'none';
      btnLabel.textContent = 'Send Message';
      successEl.style.display = 'none';
      form.style.display = 'block';
    });
  </script>
</body>
</html>
